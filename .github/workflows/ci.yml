name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Format, lint, test, build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    
    - name: Cache cargo dependencies
      uses: Swatinem/rust-cache@v2
        
    - name: Linting
      run: cargo clippy -- -D warnings

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Run tests
      run: cargo test --all-targets --all-features

    - name: Build
      run: cargo build --all-targets --all-features

    - name: Install FFmpeg on macOS
      if: matrix.os == 'macos-latest'
      run: brew install ffmpeg

    - name: Install FFmpeg on Linux
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get update && sudo apt-get install --yes ffmpeg

    - name: Build release binary
      if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
      run: cargo build --release --locked

    - name: Smoke test
      if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
      shell: bash
      run: |
        ./target/release/flacser --version
        ./target/release/flacser doctor
        # Generate a tiny fixture, convert it, and validate the output.
        mkdir -p "$RUNNER_TEMP/flacser-smoke"
        ffmpeg -y -f lavfi -i sine=frequency=1000:duration=0.1 -c:a pcm_s16le "$RUNNER_TEMP/flacser-smoke/input.wav"
        ./target/release/flacser convert --to flac --output-dir "$RUNNER_TEMP/flacser-smoke/output" "$RUNNER_TEMP/flacser-smoke/input.wav"
        ffprobe -v error -show_entries format=format_name -of default=noprint_wrappers=1:nokey=1 "$RUNNER_TEMP/flacser-smoke/output/input.flac" | grep -qx flac
